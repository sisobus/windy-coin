name: Release windy-mine to crates.io

# Triggered by pushing a `windy-mine-vX.Y.Z` tag — multi-crate repo
# so tags are crate-prefixed (future crates from this repo will use
# their own prefix, e.g. `windy-coin-core-vX.Y.Z`). Confirms the tag
# matches `cli/Cargo.toml`'s version, builds, dry-run publishes, then
# `cargo publish`es and creates a matching GitHub Release.

on:
  push:
    tags:
      - 'windy-mine-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. windy-mine-v0.1.0). Must already exist on origin.'
        required: true
        type: string

concurrency:
  group: release-windy-mine-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Resolve tag and crate version
        id: meta
        working-directory: cli
        run: |
          # GITHUB_REF on a tag push looks like `refs/tags/windy-mine-v0.1.0`.
          # workflow_dispatch supplies inputs.tag directly.
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [[ ! "$TAG" =~ ^windy-mine-v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::tag '$TAG' is not in windy-mine-vX.Y.Z form"
            exit 1
          fi
          VERSION="${TAG#windy-mine-v}"
          CARGO_VERSION=$(awk -F'"' '/^version *= *"/ { print $2; exit }' Cargo.toml)
          if [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::tag $TAG ($VERSION) does not match cli/Cargo.toml version $CARGO_VERSION"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: cargo build (verify it compiles)
        working-directory: cli
        run: cargo build --release

      - name: cargo publish (dry-run)
        working-directory: cli
        run: cargo publish --dry-run

      - name: cargo publish
        working-directory: cli
        run: cargo publish

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Skip if the release already exists (re-running the workflow
          # against an already-published tag should not error out).
          TAG="${{ steps.meta.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists, skipping create"
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "windy-mine v${{ steps.meta.outputs.version }} published to crates.io.

Install:

    cargo install windy-mine

See [\`docs/MINING-GUIDE.md\`](https://github.com/sisobus/windy-coin/blob/master/docs/MINING-GUIDE.md) for usage."
          fi
